name: Build Shap APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare the app
        working-directory: mobile/passenger_app
        run: |
          flutter create .
          flutter pub get

      - name: Build the APK
        working-directory: mobile/passenger_app
        run: flutter build apk --debug

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: shap-passenger-apk
          path: mobile/passenger_app/build/app/outputs/flutter-apk/app-debug.apk
